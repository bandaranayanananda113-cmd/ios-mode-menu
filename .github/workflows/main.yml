name: Build iOS Mod Menu

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Tweak
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Theos
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Build with Theos
        run: |
          echo "--- GitHub එකට Upload වෙලා තියෙන ෆයිල්ස් ---"
          ls -laR
          echo "---------------------------------------------"
          
          MAKEFILE_PATH=$(find . -iname "makefile" | head -n 1)
          
          if [ -z "$MAKEFILE_PATH" ]; then
            echo "Error: Makefile එක හොයාගන්න නෑ! ඔයා ඒක GitHub එකට Upload කරලා නැද්ද බලන්න."
            exit 1
          fi
          
          echo "Makefile එක හම්බවුණා මෙතනින්: $MAKEFILE_PATH"
          cd "$(dirname "$MAKEFILE_PATH")"
          make FINALPACKAGE=1

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu-Dylib
          path: "**/*.dylib"
